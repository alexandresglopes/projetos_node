<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúde Ocupacional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="stylesheet" href="styles/style.css"> 
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg p-4 style-login-card" style="width: 100%; max-width: 400px; border-radius: 12px;">
        <div class="text-center mb-4">
            <!-- <h1 class="h3 mb-2 font-weight-normal">🏥 SSO Login</h1> -->
            <i class="fa-solid fa-heart-pulse text-danger me-2 icon-login"></i><b>SSO Clínico</b>
            <p class="text-muted">Entre com suas credenciais de acesso</p>
        </div>

        <form id="form-login">
            <div class="mb-3">
                <label for="username" class="form-label font-weight-bold">Usuário</label>
                <input type="text" id="username" class="form-control form-control-lg" required placeholder="admin">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" class="form-control form-control-lg" required
                    placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">Acessar Painel</button>
        </form>

        <div class="form-group btn-voltar">
            <a href="../../index.html">Voltar</a>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin') {
                window.location.href = 'views/dashboard.html';
            } else {
                alert('Usuário ou senha incorretos! (Dica: use admin/admin)');
            }
        });
    </script>
</body>

</html>
