<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>

    <div class="container">
        <div class="voltar"><a href="../../../">Voltar</a></div>
        <form id="formEscola">

            <h2>Sistema Escolar</h2>
            <div class="form-group">
                <label for="tipoPessoa">Tipo de Cadastro:</label>
                <select id="tipoPessoa" onchange="alternarCampos()">
                    <option value="">--selecione--</option>
                    <option value="aluno">Aluno</option>
                    <option value="professor">Professor</option>
                </select>
            </div>

            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome">
            </div>
            <div class="form-group">
                <label for="sobrenome">Sobrenome:</label>
                <input type="text" id="sobrenome">
            </div>
            <div class="form-group">
                <label for="idade">Idade:</label>
                <input type="number" id="idade">
            </div>

            <div id="camposAluno">
                <div class="form-group">
                    <label for="matricula">Matrícula:</label>
                    <input type="text" id="matricula">
                </div>
                <div class="grid">
                    <div class="item">
                        <label for="notaFinal">Nota 1:</label>
                        <input type="number" id="nota1" step="0.1">
                    </div>
                    <div class="item">
                        <label for="notaFinal">Nota 2:</label>
                        <input type="number" id="nota2" step="0.1">
                    </div>
                    <div class="item">
                        <label for="notaFinal">Nota 3:</label>
                        <input type="number" id="nota3" step="0.1">
                    </div>
                    <div class="item">
                        <label for="notaFinal">Nota 3:</label>
                        <input type="number" id="nota4" step="0.1">
                    </div>
                </div>
            </div>

            <div id="camposProfessor" class="hidden">
                <div class="form-group">
                    <label for="disciplina">Disciplina:</label>
                    <input type="text" id="disciplina">
                </div>
                <div class="form-group">
                    <label for="salario">Salário Base:</label>
                    <input type="number" id="salario" step="0.01">
                </div>
            </div>

            <button type="submit">Cadastrar</button>

            <div id="resultado" class="resultado hidden"></div>

        </form>
    </div>

    <script type="module" src="../controllers/script.js"></script>    

</body>

</html>
