<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <main class="container">
        <form class="formulario" action="/atualizar-turma" method="POST">
            <h1>Editar Turma</h1>

            <input type="hidden" id="numero" name="numero">

            <label for="nome_curso">Nome do Curso</label>
            <input type="text" id="nome_curso" name="nome_curso" required>

            <label for="ano_letivo">Ano Letivo</label>
            <input type="number" id="ano_letivo" name="ano_letivo" min="2000" max="2100" required>

            <label for="matricula_professor">Professor Responsável</label>
            <select id="matricula_professor" name="matricula_professor">
                <option value="">Selecione um professor (Opcional)</option>
            </select>

            <button type="submit">Salvar Alterações</button>
            <a href="lista-turmas.html"
                style="display: block; text-align: center; margin-top: 15px; color: #1976d2; text-decoration: none; font-weight: bold;">Cancelar</a>
        </form>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const numero = urlParams.get('numero');

        async function carregarProfessoresEMostrarTurma() {
            try {
                const resProfessores = await fetch('/api/professores');
                const professores = await resProfessores.json();
                const select = document.getElementById('matricula_professor');

                professores.forEach(prof => {
                    const option = document.createElement('option');
                    option.value = prof.matricula;
                    option.text = prof.nome;
                    select.appendChild(option);
                });

                if (numero) {
                    const resTurma = await fetch(`/api/turmas/${numero}`);
                    const turma = await resTurma.json();

                    document.getElementById('numero').value = turma.numero;
                    document.getElementById('nome_curso').value = turma.nome_curso;
                    document.getElementById('ano_letivo').value = turma.ano_letivo;
                    document.getElementById('matricula_professor').value = turma.matricula_professor || "";
                }
            } catch (erro) {
                console.error("Erro ao carregar dados:", erro);
            }
        }

        carregarProfessoresEMostrarTurma();
    </script>
</body>

</html>
