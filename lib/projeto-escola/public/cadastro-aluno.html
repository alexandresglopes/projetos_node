<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <main class="container">
        <form class="formulario" action="/cadastrar-aluno" method="POST">
            <h1>Cadastrar Aluno</h1>

            <label for="nome">Nome do aluno</label>
            <input type="text" id="nome" name="nome" required>

            <label for="data_nascimento">Data de Nascimento</label>
            <input type="date" id="data_nascimento" name="data_nascimento" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>

            <label for="numero_turma">Turma</label>
            <select id="numero_turma" name="numero_turma" required>
                <option value="">Selecione uma turma</option>
            </select>

            <button type="submit">Salvar</button>
            <a href="lista-alunos.html" style="display: block; text-align: center; margin-top: 15px; color: #1976d2; text-decoration: none; font-weight: bold;">Voltar para a lista</a>
        </form>
    </main>

    <script>
        async function carregarTurmas() {
            try {
                const resposta = await fetch('/api/turmas');
                const turmas = await resposta.json();
                const select = document.getElementById('numero_turma');

                turmas.forEach(turma => {
                    const option = document.createElement('option');
                    option.value = turma.numero;
                    option.text = turma.nome_curso;
                    select.appendChild(option);
                });
            } catch (erro) {
                console.error("Erro ao carregar turmas para o select:", erro);
            }
        }

        carregarTurmas();
    </script>
</body>
</html>
