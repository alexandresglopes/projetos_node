<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar - Pagamentos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.14.0/css/all.css">
    <link rel="stylesheet" href="//cdn.datatables.net/1.10.25/css/jquery.dataTables.min.css">
</head>

<body>

    <div class="dashboard-container">

        <main class="main-content" style="width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px;">
            <center>
                <h3 id="nome-professor" style="margin-bottom: 20px;">Carregando professor...</h3>
            </center>

            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <a href="lista-professores.html" class="btn-acao"
                    style="background-color: #757575; color: white; padding: 10px 20px; font-size: 14px; border-radius: 6px;"><i
                        class="fas fa-arrow-left"></i> Voltar</a>
                <h1 style="margin: 0;">Histórico Pagamento</h1>
                <button id="btnAbrirModal" class="btn-novo">+ PG</button>
            </header>

            <section class="tabela-container">
                <table class="tabela-dados minhaTabela">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Horas Trabalhadas</th>
                            <th>Valor Hora</th>
                            <th>Data Pg.</th>
                            <th>Salário</th>
                            <th style="text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-professores-corpo"></tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="modalPagamento" class="modal">
        <div class="modal-content">
            <span class="fechar-modal" id="btnFecharModal">&times;</span>
            <form class="formulario" action="/cadastrar-pagamento" method="POST"
                style="box-shadow: none; padding: 0; width: 100%;">
                <h2>Lançar Pagamento</h2>

                <input type="hidden" id="modal_matricula_professor" name="matricula_professor">

                <label for="horas_trabalhadas">Horas Trabalhadas</label>
                <input type="number" id="horas_trabalhadas" name="horas_trabalhadas" min="1" required>

                <label for="valor_hora">Valor por Hora (R$)</label>
                <input type="number" id="valor_hora" name="valor_hora" step="0.01" min="0.01" required>

                <label for="data_pagamento">Data de Pagamento</label>
                <input type="date" id="data_pagamento" name="data_pagamento" required>

                <label for="salario">Salário Total (R$)</label>
                <input type="number" id="salario" name="salario" step="0.01" readonly
                    style="background-color: #f5f5f5; cursor: not-allowed;">

                <button type="submit" style="margin-top: 10px; width: 100%;">Salvar Pagamento</button>
            </form>
        </div>
    </div>

    <div id="modalSucesso" class="modal" style="z-index: 1100;">
        <div class="modal-content" style="text-align: center; width: 300px; margin: 15% auto;">
            <div style="color: #2e7d32; font-size: 50px; margin-bottom: 10px;">
                <i class="far fa-check-circle"></i>
            </div>
            <h2 style="margin-bottom: 15px;">Sucesso!</h2>
            <p>O registro de pagamento foi excluído com êxito.</p>
            <button id="btnFecharSucesso" class="btn-novo"
                style="background-color: #2e7d32; margin-top: 15px; width: 100%;">Ok</button>
        </div>
    </div>

    <script src="//code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="//cdn.datatables.net/1.10.25/js/jquery.dataTables.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const matricula = urlParams.get('matricula');

        document.getElementById('modal_matricula_professor').value = matricula;

        function inicializarDataTable() {
            $('.minhaTabela').DataTable({
                "destroy": true,
                "pageLength": 500,
                "order": [[0, "desc"]],
                "language": {
                    "searchPlaceholder": "Buscar...",
                    "lengthMenu": "Mostrando _MENU_ registros por página",
                    "sSearch": "",
                    "zeroRecords": "Nenhum pagamento registrado para este professor.",
                    "info": "Mostrando página _PAGE_ de _PAGES_",
                    "infoEmpty": "Nenhum registro disponível",
                    "infoFiltered": "(filtrado de _MAX_ registros no total)",
                    "url": "//cdn.datatables.net/plug-ins/1.10.24/i18n/Portuguese-Brasil.json"
                },
                "columnDefs": [
                    { "orderable": false, "targets": "no-sort" }
                ]
            });
        }

        async function carregarDados() {
            try {
                const respostaProf = await fetch(`/api/professores/${matricula}`);
                const professor = await respostaProf.json();
                document.getElementById('nome-professor').innerHTML = `Professor(a): ${professor.nome}`;

                const respostaPg = await fetch(`/api/pgprofessores/${matricula}`);
                const pagamentos = await respostaPg.json();

                const corpoTabela = document.getElementById('tabela-professores-corpo');
                corpoTabela.innerHTML = '';

                if (pagamentos && pagamentos.length > 0) {
                    pagamentos.forEach(pg => {
                        const dataFormatada = new Date(pg.data_pagamento).toLocaleDateString('pt-BR', { timeZone: 'UTC' });
                        const linha = `
                            <tr>
                                <td>${pg.id}</td>
                                <td>${pg.horas_trabalhadas}h</td>
                                <td>R$ ${pg.valor_hora}</td>
                                <td>${dataFormatada}</td>
                                <td><strong>R$ ${pg.salario}</strong></td>
                                <td style="text-align: center;">                                
                                    <a href="editar-pagamento.html?id=${pg.id}" class="btn-acao btn-editar"><i class="fas fa-edit"></i></a>
                                    <button onclick="deletarPagamento(${pg.id})" class="btn-acao btn-excluir"><i class="far fa-trash-alt"></i></button>
                                </td>
                            </tr>
                        `;
                        corpoTabela.innerHTML += linha;
                    });
                }

                inicializarDataTable();

            } catch (erro) {
                console.error("Erro ao carregar dados:", erro);
            }
        }

        async function deletarPagamento(id) {
            if (confirm("Tem certeza que deseja excluir este registro de pagamento?")) {
                try {

                    const resposta = await fetch(`/api/delpagamentos/${id}`, {
                        method: 'DELETE'
                    });

                    if (resposta.ok) {

                        const modalSucesso = document.getElementById("modalSucesso");
                        const btnFecharSucesso = document.getElementById("btnFecharSucesso");

                        modalSucesso.style.display = "block";

                        btnFecharSucesso.onclick = function () {
                            modalSucesso.style.display = "none";
                            window.location.href = `historico-pagamentos.html?matricula=${matricula}`;
                        };
                    } else {
                        alert("Erro ao excluir o pagamento.");
                    }
                } catch (erro) {
                    console.error("Erro ao deletar pagamento:", erro);
                }
            }
        }

        const modal = document.getElementById("modalPagamento");
        const btnAbrir = document.getElementById("btnAbrirModal");
        const btnFechar = document.getElementById("btnFecharModal");

        const inputHoras = document.getElementById("horas_trabalhadas");
        const inputValor = document.getElementById("valor_hora");
        const inputSalario = document.getElementById("salario");

        btnAbrir.onclick = function () { modal.style.display = "block"; }
        btnFechar.onclick = function () { modal.style.display = "none"; }
        window.onclick = function (event) {
            if (event.target == modal) { modal.style.display = "none"; }
        }

        function calcularSalario() {
            const horas = parseFloat(inputHoras.value) || 0;
            const valor = parseFloat(inputValor.value) || 0;
            const total = horas * valor;
            inputSalario.value = total.toFixed(2);
        }

        inputHoras.addEventListener("input", calcularSalario);
        inputValor.addEventListener("input", calcularSalario);

        if (matricula) {
            carregarDados();
        }      
    </script>
</body>

</html>
