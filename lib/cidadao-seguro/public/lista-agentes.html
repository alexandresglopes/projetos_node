<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidadão Seguro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.14.0/css/all.css">
    <link rel="stylesheet" href="//cdn.datatables.net/1.10.25/css/jquery.dataTables.min.css">
    <style>
        .btn-menu-toggle {
            position: fixed;
            top: 15px;
            left: 15px;
            background-color: #1f2d3d;
            color: #ffffff;
            border: none;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            z-index: 3000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none;
        }
        @media (max-width: 768px) {
            .btn-menu-toggle { display: block; }
        }
    </style>
</head>
<body>

    <button class="btn-menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
    </button>

    <div class="dashboard-container">
        
        <aside class="sidebar" id="sidebarMenu">
            <h2>Cidadão Seguro</h2>
            <nav>
                <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="lista-cidadaos.html"><i class="fas fa-users"></i> Cidadãos</a>
                <a href="lista-agentes.html" class="active"><i class="fas fa-user-shield"></i> Agentes</a>
                <a href="lista-bairros.html"><i class="fas fa-map-marked-alt"></i> Bairros</a>
                <a href="lista-ocorrencias.html"><i class="fas fa-exclamation-triangle"></i> Ocorrências</a>
                <a href="/logout" class="btn-sair"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h1>Agentes de Segurança</h1>
                    <p style="color: #64748b; margin-top: 5px;">Gerenciamento de corporações e equipes ativas de atendimento.</p>
                </div>
                <button class="btn-novo" onclick="abrirModalCadastro()"><i class="fas fa-plus"></i> Novo Agente</button>
            </header>

            
            <section class="tabela-container">
                <table class="tabela-dados minhaTabela">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Matrícula</th>
                            <th>Cargo</th>
                            <th>Turno</th>
                            <th>CPF</th>
                            <th>Telefone</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </section>
        </main>
    </div>

    
    <div id="modalAgente" class="modal">
        <div class="modal-content">
            <span class="fechar-modal" onclick="fecharModal()">&times;</span>
            <h2 id="modal-titulo">Cadastrar Novo Agente</h2>
            
            <form id="formAgente" class="formulario" style="box-shadow: none; padding: 10px 0 0 0; margin-top: 10px;">
                <input type="hidden" id="id_agente" name="id_agente">

                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Sargento Silva" required>

                <div class="form-row">
                    <div class="form-group">
                        <label for="matricula">Matrícula Funcional</label>
                        <input type="text" id="matricula" name="matricula" placeholder="Ex: PM-88231" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cargo">Cargo / Corporação</label>
                        <select id="cargo" name="cargo" required>
                            <option value="">-- Selecione --</option>
                            <option value="Policial">Policial</option>
                            <option value="Guardas">Guarda Municipal</option>
                            <option value="Bombeiros">Bombeiro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="turno">Turno de Trabalho</label>
                        <select id="turno" name="turno" required>
                            <option value="">-- Selecione --</option>
                            <option value="Matutino">Matutino</option>
                            <option value="Vespertino">Vespertino</option>
                            <option value="Noturno">Noturno</option>
                            <option value="Escala 12x36">Escala 12x36</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">E-mail Corporativo</label>
                        <input type="email" id="email" name="email" placeholder="agente@seguranca.gov">
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone / rádio</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">
                    </div>
                </div>

                <button type="submit" style="width: 100%; margin-top: 10px;">Salvar Agente</button>
            </form>
        </div>
    </div>

    
    <script src="//code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="//cdn.datatables.net/1.10.25/js/jquery.dataTables.min.js"></script>
    <script src="/controllers/script.js"></script>

    <script>
        
        window.addEventListener('DOMContentLoaded', () => {
            const inputCPF = document.getElementById('cpf');
            const inputTelefone = document.getElementById('telefone');
            if (inputCPF) inputCPF.addEventListener('input', function() { mascaraCPF(this); });
            if (inputTelefone) inputTelefone.addEventListener('input', function() { mascaraCelular(this); });
        });

        
        const menuToggle = document.getElementById('menuToggle');
        const sidebarMenu = document.getElementById('sidebarMenu');
        menuToggle.addEventListener('click', (e) => {
            sidebarMenu.classList.toggle('ativo');
            e.stopPropagation();
        });
        document.addEventListener('click', (e) => {
            if (!sidebarMenu.contains(e.target) && sidebarMenu.classList.contains('ativo')) {
                sidebarMenu.classList.remove('ativo');
            }
        });

        
        async function carregarAgentes() {
            try {
                
                if ($.fn.DataTable.isDataTable('.minhaTabela')) {
                    $('.minhaTabela').DataTable().destroy(false);
                }

                
                const resposta = await fetch('/api/agentes');
                const agentes = await resposta.json();
                const corpo = document.getElementById('corpo-tabela');
                
                
                corpo.innerHTML = '';
                agentes.forEach(a => {
                    corpo.innerHTML += `
                        <tr>
                            <td>${a.id_agente}</td>
                            <td><strong>${a.nome}</strong></td>
                            <td><code>${a.matricula}</code></td>
                            <td>${a.cargo}</td>
                            <td>${a.turno}</td>
                            <td>${a.cpf}</td>
                            <td>${a.telefone || '-'}</td>
                            <td>
                                <button class="btn-tabela btn-editar" onclick="editarAgente(${a.id_agente})"><i class="fas fa-edit"></i></button>
                                <button class="btn-tabela btn-deletar" onclick="deletarAgente(${a.id_agente})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });

                
                $('.minhaTabela').DataTable({
                    "order": [[0, "desc"]],
                    "language": {
                        "url": "//cdn.datatables.net/plug-ins/1.10.24/i18n/Portuguese-Brasil.json"
                    }
                });
            } catch (erro) {
                console.error("Erro ao carregar os agentes:", erro);
            }
        }

        const modal = document.getElementById('modalAgente');

        function abrirModalCadastro() {
            document.getElementById('formAgente').reset();
            document.getElementById('id_agente').value = '';
            document.getElementById('modal-titulo').innerText = 'Cadastrar Novo Agente';
            modal.style.display = 'block';
        }

        function fecharModal() {
            modal.style.display = 'none';
        }

        async function editarAgente(id) {
            try {
                const resposta = await fetch(`/api/agentes/${id}`);
                const a = await resposta.json();
                if (!a) return;

                document.getElementById('id_agente').value = a.id_agente;
                document.getElementById('nome').value = a.nome;
                document.getElementById('matricula').value = a.matricula;
                document.getElementById('cpf').value = a.cpf;
                document.getElementById('cargo').value = a.cargo;
                document.getElementById('turno').value = a.turno;
                document.getElementById('email').value = a.email;
                document.getElementById('telefone').value = a.telefone;

                document.getElementById('modal-titulo').innerText = 'Editar Agente';
                modal.style.display = 'block';
            } catch (erro) {
                console.error("Erro ao buscar dados do agente:", erro);
            }
        }

        document.getElementById('formAgente').addEventListener('submit', async function(e) {
            e.preventDefault();

            const id = document.getElementById('id_agente').value;
            const dados = {
                id_agente: id,
                nome: document.getElementById('nome').value,
                matricula: document.getElementById('matricula').value,
                cpf: document.getElementById('cpf').value,
                cargo: document.getElementById('cargo').value,
                turno: document.getElementById('turno').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value
            };

            const url = id ? '/api/agentes/atualizar' : '/api/agentes';

            try {
                const resposta = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (resposta.ok) {
                    fecharModal();
                    exibirSucesso("Salvo!", "Os dados do agente foram registrados corretamente.");
                    carregarAgentes();
                } else {
                    exibirErro("Erro ao salvar", "Verifique as informações preenchidas e tente novamente.");
                }
            } catch (erro) {
                console.error("Erro na requisição:", erro);
                exibirErro("Falha de Conexão", "O servidor não respondeu à solicitação.");
            }
        });

        async function deletarAgente(id) {
            if (confirm("Deseja realmente remover este agente?")) {
                try {
                    const resposta = await fetch(`/api/agentes/${id}`, { method: 'DELETE' });
                    if (resposta.ok) {
                        exibirSucesso("Excluído!", "O registro foi removido com sucesso.");
                        carregarAgentes();
                    } else {
                        exibirErro("Não permitido", "Este agente não pode ser removido porque existem atendimentos vinculados a ele.");
                    }
                } catch (erro) {
                    console.error("Erro ao deletar:", erro);
                    exibirErro("Erro de comunicação", "Não foi possível enviar o comando de exclusão.");
                }
            }
        }

        carregarAgentes();
    </script>
</body>
</html>
