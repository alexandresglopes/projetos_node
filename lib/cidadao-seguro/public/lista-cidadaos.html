<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidadão Seguro</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.14.0/css/all.css">
    <link rel="stylesheet" href="//cdn.datatables.net/1.10.25/css/jquery.dataTables.min.css">
    <style>
        .btn-menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            background-color: #1f2d3d;
            color: #ffffff;
            border: none;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            z-index: 3000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .btn-menu-toggle {
                display: block;
            }
        }
    </style>
</head>

<body>

    <button class="btn-menu-toggle" id="menuToggle">
        <i class="fas fa-bars"></i>
    </button>

    <div class="dashboard-container">
        
        <aside class="sidebar" id="sidebarMenu">
            <h2>Cidadão Seguro</h2>
            <nav>
                <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="lista-cidadaos.html" class="active"><i class="fas fa-users"></i> Cidadãos</a>
                <a href="lista-agentes.html"><i class="fas fa-user-shield"></i> Agentes</a>
                <a href="lista-bairros.html"><i class="fas fa-map-marked-alt"></i> Bairros</a>
                <a href="lista-ocorrencias.html"><i class="fas fa-exclamation-triangle"></i> Ocorrências</a>
                <a href="/logout" class="btn-sair"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        
        <main class="main-content">
            <header
                style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h1>Gerenciamento de Cidadãos</h1>
                    <p style="color: #64748b; margin-top: 5px;">Cadastro e controle de pessoas que reportam incidentes.
                    </p>
                </div>
                <button class="btn-novo" onclick="abrirModalCadastro()"><i class="fas fa-plus"></i> Novo
                    Cidadão</button>
            </header>

            
            <section class="tabela-container">
                <table class="tabela-dados minhaTabela">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>Endereço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </section>
        </main>
    </div>

    
    <div id="modalCidadao" class="modal">
        <div class="modal-content">
            <span class="fechar-modal" onclick="fecharModal()">&times;</span>
            <h2 id="modal-titulo">Cadastrar Novo Cidadão</h2>

            <form id="formCidadao" class="formulario" style="box-shadow: none; padding: 10px 0 0 0; margin-top: 10px;">
                <input type="hidden" id="id_cidadao" name="id_cidadao">

                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Maria Oliveira" required>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label for="data_nascimento">Data de Nascimento</label>
                        <input type="date" id="data_nascimento" name="data_nascimento" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="nome@exemplo.com">
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000">
                    </div>
                </div>

                <label for="endereco">Endereço Completo</label>
                <input type="text" id="endereco" name="endereco" placeholder="Rua, Número, Bairro" required>

                <button type="submit" style="width: 100%; margin-top: 10px;">Salvar Cidadão</button>
            </form>
        </div>
    </div>

    
    <script src="//code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="//cdn.datatables.net/1.10.25/js/jquery.dataTables.min.js"></script>
    <script src="/controllers/script.js"></script>

    <script>
        
        window.addEventListener('DOMContentLoaded', () => {
            const inputCPF = document.getElementById('cpf');
            const inputTelefone = document.getElementById('telefone');
            if (inputCPF) inputCPF.addEventListener('input', function () { mascaraCPF(this); });
            if (inputTelefone) inputTelefone.addEventListener('input', function () { mascaraCelular(this); });
        });

        
        const menuToggle = document.getElementById('menuToggle');
        const sidebarMenu = document.getElementById('sidebarMenu');
        menuToggle.addEventListener('click', (e) => {
            sidebarMenu.classList.toggle('ativo');
            e.stopPropagation();
        });
        document.addEventListener('click', (e) => {
            if (!sidebarMenu.contains(e.target) && sidebarMenu.classList.contains('ativo')) {
                sidebarMenu.classList.remove('ativo');
            }
        });

        
        function destruirEInicializarDataTable() {
            if ($.fn.DataTable.isDataTable('.minhaTabela')) {
                $('.minhaTabela').DataTable().destroy();
            }
            $('.minhaTabela').DataTable({
                "order": [[0, "desc"]],
                "language": {
                    "url": "//cdn.datatables.net/plug-ins/1.10.24/i18n/Portuguese-Brasil.json"
                }
            });
        }

        async function carregarCidadaos() {
            try {
                
                if ($.fn.DataTable.isDataTable('.minhaTabela')) {
                    $('.minhaTabela').DataTable().destroy(false); 
                }

                
                const resposta = await fetch('/api/cidadaos');
                const cidadaos = await resposta.json();
                const corpo = document.getElementById('corpo-tabela');

                
                corpo.innerHTML = '';
                cidadaos.forEach(c => {
                    corpo.innerHTML += `
                <tr>
                    <td>${c.id_cidadao}</td>
                    <td><strong>${c.nome}</strong></td>
                    <td>${c.cpf}</td>
                    <td>${c.email || '-'}</td>
                    <td>${c.telefone || '-'}</td>
                    <td>${c.endereco}</td>
                    <td>
                        <button class="btn-tabela btn-editar" onclick="editarCidadao(${c.id_cidadao})"><i class="fas fa-edit"></i></button>
                        <button class="btn-tabela btn-deletar" onclick="deletarCidadao(${c.id_cidadao})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
                });

                
                $('.minhaTabela').DataTable({
                    "order": [[0, "desc"]],
                    "language": {
                        "url": "//cdn.datatables.net/plug-ins/1.10.24/i18n/Portuguese-Brasil.json"
                    }
                });
            } catch (erro) {
                console.error("Erro ao carregar cidadãos:", erro);
            }
        }

        
        const modal = document.getElementById('modalCidadao');

        function abrirModalCadastro() {
            document.getElementById('formCidadao').reset();
            document.getElementById('id_cidadao').value = '';
            document.getElementById('modal-titulo').innerText = 'Cadastrar Novo Cidadão';
            modal.style.display = 'block';
        }

        function fecharModal() {
            modal.style.display = 'none';
        }

        async function editarCidadao(id) {
            try {
                const resposta = await fetch(`/api/cidadaos/${id}`);
                const c = await resposta.json();
                if (!c) return;

                document.getElementById('id_cidadao').value = c.id_cidadao;
                document.getElementById('nome').value = c.nome;
                document.getElementById('cpf').value = c.cpf;
                document.getElementById('email').value = c.email;
                document.getElementById('telefone').value = c.telefone;
                document.getElementById('endereco').value = c.endereco;

                
                if (c.data_nascimento) {
                    const data = new Date(c.data_nascimento);
                    const dataFormatada = data.toISOString().split('T')[0];
                    document.getElementById('data_nascimento').value = dataFormatada;
                }

                document.getElementById('modal-titulo').innerText = 'Editar Cidadão';
                modal.style.display = 'block';
            } catch (erro) {
                console.error("Erro ao buscar dados do cidadão:", erro);
            }
        }

        document.getElementById('formCidadao').addEventListener('submit', async function (e) {
            e.preventDefault();

            const id = document.getElementById('id_cidadao').value;
            const dados = {
                id_cidadao: id,
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                endereco: document.getElementById('endereco').value,
                data_nascimento: document.getElementById('data_nascimento').value
            };

            const url = id ? '/api/cidadaos/atualizar' : '/api/cidadaos';

            try {
                const resposta = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (resposta.ok) {
                    fecharModal(); 

                    
                    exibirSucesso("Salvo!", "Os dados do cidadão foram registrados corretamente.");

                    
                    carregarCidadaos();
                } else {
                    exibirErro("Erro ao salvar", "Verifique as informações preenchidas e tente novamente.");
                }
            } catch (erro) {
                console.error("Erro na requisição:", erro);
                exibirErro("Falha de Conexão", "O servidor não respondeu à solicitação.");
            }
        });

        
        async function deletarCidadao(id) {
            if (confirm("Tem certeza que deseja remover este cidadão do sistema?")) {
                try {
                    const resposta = await fetch(`/api/cidadaos/${id}`, {
                        method: 'DELETE'
                    });

                    if (resposta.ok) {
                        exibirSucesso("Excluído!", "O registro foi removido com sucesso.");

                        
                        carregarCidadaos();
                    } else {
                        
                        exibirErro("Não permitido", "Este cidadão não pode ser removido porque existem Boletins de Ocorrência vinculados ao nome dele.");
                    }
                } catch (erro) {
                    console.error("Erro ao deletar:", erro);
                    exibirErro("Erro de comunicação", "Não foi possível enviar o comando de exclusão.");
                }
            }
        }

        
        carregarCidadaos();
    </script>
</body>

</html>
