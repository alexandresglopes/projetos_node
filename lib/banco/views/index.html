<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>

    <div class="container">
        <div class="voltar"><a href="../../../">Voltar</a></div>
        <form id="formBanco">

            <h2>Sistema Bancário</h2>
            <div class="form-group">
                <label for="tipoConta">Tipo de Conta:</label>
                <select id="tipoConta" onchange="alternarCampos()">
                    <option value="">---selecione---</option>
                    <option value="corrente">Conta Corrente</option>
                    <option value="poupanca">Conta Poupança</option>
                </select>
            </div>

            <div class="form-group">
                <label for="numero">Número da Conta:</label>
                <input type="text" id="numero">
            </div>
            <div class="form-group">
                <label for="saldo">Saldo Inicial:</label>
                <input type="number" id="saldo" step="0.01">
            </div>

            <div id="camposCorrente">
                <div class="form-group">
                    <label for="limite">Limite Especial:</label>
                    <input type="number" id="limite" step="0.01">
                </div>
            </div>

            <div id="camposPoupanca" class="hidden">
                <div class="form-group">
                    <label for="rendimento">Taxa de Rendimento (%):</label>
                    <input type="number" id="rendimento" step="0.01">
                </div>
            </div>

            <button type="submit">Salvar</button>

        </form>

        <div id="operacoes" class="hidden" style="margin-top: 20px; border-top: 1px solid #ccc; padding-top: 15px;">
            <h3>Operações</h3>
            <div class="form-group">
                <label for="valorOp">Valor da Operação:</label>
                <input type="number" id="valorOp" step="0.01">
            </div>
            <div class="btn-group">
                <button class="action" onclick="executarOperacao('depositar')">Depositar</button>
                <button class="action2" onclick="executarOperacao('sacar')">Sacar</button>
                <button id="btnRendimento" class="action hidden" onclick="executarOperacao('render')">Calcular
                    Rendimento</button>
            </div>
        </div>

        <div id="resultado" class="resultado hidden"></div>
    </div>

    <script type="module" src="../controllers/script.js"></script>
    
</body>

</html>
