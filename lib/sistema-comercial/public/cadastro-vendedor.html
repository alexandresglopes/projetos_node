<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Comercial</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.14.0/css/all.css">
</head>

<body>

    <div class="dashboard-container">
        <main class="main-content" style="max-width: 700px; margin: 0 auto;">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Novo Vendedor</h1>
                <a href="lista-vendedores.html" class="btn-acao" style="background-color: #757575; color: white;"><i class="fas fa-list"></i> Ver Vendedores</a>
            </header>

            <form class="formulario" action="/cadastrar-vendedor" method="POST" style="width: 100%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 25px;">
                <label for="nome">Nome do Vendedor</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Carlos Souza" required>

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="matricula">Matrícula</label>
                        <input type="text" id="matricula" name="matricula" placeholder="Ex: VEND2026" required>
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label for="email">E-mail Corporativo</label>
                        <input type="email" id="email" name="email" placeholder="carlos@empresa.com" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label for="setor">Setor</label>
                        <input type="text" id="setor" name="setor" placeholder="Ex: Eletrônicos" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="comissao">Taxa de Comissão (%)</label>
                        <input type="number" id="comissao" name="comissao" step="0.1" min="0" placeholder="Ex: 5.0" required>
                    </div>
                </div>

                <button type="submit" style="margin-top: 20px; width: 100%;">Salvar Vendedor</button>
            </form>
        </main>
    </div>

</body>
</html>
