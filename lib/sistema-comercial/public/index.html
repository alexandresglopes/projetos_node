<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Comercial</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.14.0/css/all.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-container p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .erro-mensagem {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h1>Sistema Comercial</h1>
        <p>Painel de Gestão de Vendas</p>

        <div id="erro-alerta" class="erro-mensagem">
            <i class="fas fa-exclamation-circle"></i> Usuário ou senha incorretos!
        </div>

        <form class="formulario" action="/login" method="POST"
            style="box-shadow: none; padding: 0; width: 100%; text-align: left;">
            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required>

            <label for="senha">Senha</label>
            <div class="campo-senha-container" style="position: relative; width: 100%;">
                <input type="password" id="senha" name="senha" placeholder="*****"
                    style="padding-right: 40px; margin-bottom: 18px;" required>
                <i class="fas fa-eye" id="toggleSenha"
                    style="position: absolute; right: 15px; top: 13px; cursor: pointer; color: #757575; font-size: 16px;"></i>
            </div>

            <button type="submit" style="margin-top: 15px; width: 100%; background-color: #1e3c72;">Entrar no
                Sistema</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('erro') === '1') {
            document.getElementById('erro-alerta').style.display = 'block';
        }

        const senhaInput = document.getElementById('senha');
        const toggleSenhaIcon = document.getElementById('toggleSenha');

        toggleSenhaIcon.addEventListener('click', function () {
            if (senhaInput.type === 'password') {
                senhaInput.type = 'text';
                toggleSenhaIcon.classList.remove('fa-eye');
                toggleSenhaIcon.classList.add('fa-eye-slash');
            } else {
                senhaInput.type = 'password';
                toggleSenhaIcon.classList.remove('fa-eye-slash');
                toggleSenhaIcon.classList.add('fa-eye');
            }
        });
    </script>
</body>

</html>
