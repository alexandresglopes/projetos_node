<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Comercial</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.14.0/css/all.css">

</head>

<body>

    <div class="dashboard-container">
        <main class="main-content" style="max-width: 700px; margin: 0 auto;">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Novo Cliente</h1>
                <a href="lista-clientes.html" class="btn-acao" style="background-color: #757575; color: white;"><i
                        class="fas fa-list"></i> Ver Clientes</a>
            </header>

            <form class="formulario" action="/cadastrar-cliente" method="POST"
                style="width: 100%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 25px;">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label for="cpf">CPF</label>                        
                        <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="data_nascimento">Data de Nascimento</label>
                        <input type="date" id="data_nascimento" name="data_nascimento" required>
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required>
                    </div>
                    <div style="flex: 1;">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <label for="endereco">Endereço Residencial</label>
                <input type="text" id="endereco" name="endereco" placeholder="Rua, Número, Bairro, Cidade" required>

                <button type="submit" style="margin-top: 20px; width: 100%;">Salvar Cliente</button>
            </form>
        </main>
    </div>

    <script src="/controllers/script.js"></script>

    <script>        
        window.addEventListener('DOMContentLoaded', () => {
            const inputCPF = document.getElementById('cpf');
            const inputTelefone = document.getElementById('telefone');
            
            if (inputCPF) {
                inputCPF.addEventListener('input', function() {
                    mascaraCPF(this);
                });
            }
            
            if (inputTelefone) {
                inputTelefone.addEventListener('input', function() {
                    mascaraCelular(this);
                });
            }
        });
    </script>
</body>

</html>
