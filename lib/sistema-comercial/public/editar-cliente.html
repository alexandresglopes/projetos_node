<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Comercia</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <main class="container">
        <form class="formulario" action="/atualizar-aluno" method="POST">
            <h1>Editar Cliente</h1>

            <input type="hidden" id="matricula" name="matricula">

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required>

            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" required>
                </div>
                <div style="flex: 1;">
                    <label for="data_nascimento">Data de Nascimento</label>
                    <input type="date" id="data_nascimento" name="data_nascimento" required>
                </div>
            </div>

            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required>
                </div>
                <div style="flex: 1;">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                </div>
            </div>

            <label for="endereco">Endereço Residencial</label>
            <input type="text" id="endereco" name="endereco" placeholder="Rua, Número, Bairro, Cidade" required>

            <button type="submit">Salvar Alterações</button>
            <a href="lista-alunos.html"
                style="display: block; text-align: center; margin-top: 15px; color: #1976d2; text-decoration: none; font-weight: bold;">Cancelar</a>
        </form>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const matricula = urlParams.get('matricula');

        async function carregarTurmasEMostrarAluno() {
            try {
                const resTurmas = await fetch('/api/turmas');
                const turmas = await resTurmas.json();
                const select = document.getElementById('numero_turma');

                turmas.forEach(turma => {
                    const option = document.createElement('option');
                    option.value = turma.numero;
                    option.text = turma.nome_curso;
                    select.appendChild(option);
                });

                if (matricula) {
                    const resAluno = await fetch(`/api/alunos/${matricula}`);
                    const aluno = await resAluno.json();

                    document.getElementById('matricula').value = aluno.matricula;
                    document.getElementById('nome').value = aluno.nome;

                    const dataFormatada = aluno.data_nascimento.split('T')[0];
                    document.getElementById('data_nascimento').value = dataFormatada;

                    document.getElementById('email').value = aluno.email;
                    document.getElementById('numero_turma').value = aluno.numero_turma;
                }
            } catch (erro) {
                console.error("Erro ao carregar dados:", erro);
            }
        }

        carregarTurmasEMostrarAluno();
    </script>
</body>

</html>
