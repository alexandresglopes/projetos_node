<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>

    <div class="container">
        <div class="voltar"><a href="../../../">Voltar</a></div>
        <form id="formEmpresa">

            <h2>RH Tech - Cadastro Corporativo</h2>
            <div class="form-group">
                <label for="cargo">Cargo:</label>
                <select id="cargo" onchange="alternarCampos()">
                    <option value="">---selecione---</option>
                    <option value="dev">Desenvolvedor</option>
                    <option value="analista">Analista</option>
                </select>
            </div>

            <div class="form-group">
                <label for="nome">Nome do Funcionário:</label>
                <input type="text" id="nome">
            </div>
            <div class="form-group">
                <label for="salario">Salário Contratual (R$):</label>
                <input type="number" id="salario" step="0.01">
            </div>

            <div id="camposDev">
                <div class="form-group">
                    <label for="linguagem">Linguagem Principal:</label>
                    <input type="text" id="linguagem" placeholder="Ex: JavaScript, Python">
                </div>
            </div>

            <div id="camposAnalista" class="hidden">
                <div class="form-group">
                    <label for="projeto">Projeto Alocado:</label>
                    <input type="text" id="projeto">
                </div>
            </div>

            <button type="submit">Registrar</button>

        </form>


        <div id="resultado" class="resultado hidden"></div>
    </div>

    <script type="module" src="../controllers/script.js"></script>
</body>

</html>
